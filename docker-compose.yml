services:
  mysql:
    image: mysql:8.4
    # --secure-file-priv: allows LOAD DATA INFILE from init dir
    # --local-infile: required for GeoNames TSV import
    command: --secure-file-priv=/docker-entrypoint-initdb.d --local-infile=1
    container_name: mysql
    networks:
      - family-tree
    environment:
      MYSQL_DATABASE: family_tree
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: keycloak
    networks:
      - family-tree
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    command: start-dev --health-enabled=true
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 && timeout 2 cat <&3 | grep -q 'HTTP/1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - family-tree
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: family-tree-backend:latest
    container_name: backend
    networks:
      - family-tree
    environment:
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_URL: ${DB_URL}
      OIDC_AUTH_SERVER_URL: ${OIDC_AUTH_SERVER_URL}
      OIDC_TOKEN_ISSUER: ${OIDC_TOKEN_ISSUER}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    image: family-tree-frontend:latest
    container_name: frontend
    networks:
      - family-tree
    environment:
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend

networks:
  family-tree:
    driver: bridge

volumes:
  mysql_data:
  keycloak_data:
  minio_data:
