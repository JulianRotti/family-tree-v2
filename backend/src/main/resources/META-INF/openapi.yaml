openapi: 3.0.1
info:
  title: Family Tree API
  version: 1.0.0
  description: |
    API for managing members, relationships, and generating a nested family tree structure.

    Image handling:
    - Internal DB stores a persistent image path/reference.
    - On GET, the backend may transform that reference into a one-time URL and returns it via `imagePath`.

    Authentication:
    - All endpoints require a valid JWT obtained from Keycloak.
    - Pass the token in the `Authorization` header as: `Authorization: Bearer <JWT>`
servers:
  - url: /

tags:
  - name: Members
  - name: Relationships
  - name: FamilyTree
  - name: Geocode

security:
  - bearerAuth: []
  - keycloak: [openid]

paths:
  /api/members:
    get:
      tags: [Members]
      operationId: listMembers
      summary: List members (optionally filtered)
      description: |
        Returns all members. Optional query parameters can be combined (AND semantics).
      parameters:
        - in: query
          name: firstName
          schema:
            type: string
          description: Filter by first name.
        - in: query
          name: lastName
          schema:
            type: string
          description: Filter by last name.
        - in: query
          name: birthDate
          schema:
            type: string
            format: date
          description: Filter by birth date (YYYY-MM-DD), exact match.
        - in: query
          name: page
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Zero-based page index.
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 20
          description: Number of members per page.
      responses:
        "200":
          description: Paginated list of members (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberPageDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Members]
      operationId: createMember
      summary: Create a member
      description: |
        Creates a member. If an `image` file is provided, the backend stores it externally
        and persists only the resulting path/reference internally.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MemberRequestDto"
            encoding:
              imageFile:
                contentType: image/png, image/jpeg
      responses:
        "201":
          description: Member created.
          headers:
            Location:
              description: URI of the created member.
              schema:
                type: string
                example: /api/members/123
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/members/{memberId}:
    get:
      tags: [Members]
      operationId: getMemberById
      summary: Get a member by id
      description: |
        Returns the member. The `imagePath` returned may be a one-time URL generated by the backend.
      parameters:
        - $ref: "#/components/parameters/MemberIdPath"
      responses:
        "200":
          description: The member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags: [Members]
      operationId: updateMemberById
      summary: Update a member by id (full replace)
      description: |
        Full replace semantics. All required member fields must be present.

        Image handling:
        - If `image` is provided, the backend replaces the previously stored image (delete old, store new)
          and persists only the new path/reference internally.
      parameters:
        - $ref: "#/components/parameters/MemberIdPath"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MemberRequestDto"
            encoding:
              imageFile:
                contentType: image/png, image/jpeg
      responses:
        "200":
          description: Updated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Members]
      operationId: deleteMemberById
      summary: Delete a member by id
      parameters:
        - $ref: "#/components/parameters/MemberIdPath"
      responses:
        "204":
          description: Member deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/members/bulk/csv/template:
    get:
      tags: [Members]
      operationId: getBulkCsvTemplate
      summary: Download a CSV template for bulk member upload
      description: |
        Returns a CSV file with the required column headers and one example row.
        Fill in the data in Excel (or any spreadsheet tool) and upload via
        POST /api/members/bulk/csv.
      responses:
        "200":
          description: CSV template file.
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/members/bulk/csv:
    post:
      tags: [Members]
      operationId: bulkCreateMembersFromCsv
      summary: Bulk-create members from a CSV file
      description: |
        Upload a CSV file exported from Excel or any spreadsheet tool.
        The first row must contain column headers (case-insensitive).
        Both comma (,) and semicolon (;) delimiters are accepted.
        lat/lng are not required — they are resolved automatically from GeoNames.
        Best-effort: valid rows are saved, invalid rows are returned in `failed`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to upload.
      responses:
        "200":
          description: Bulk result with created members and any failures.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUploadResultDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/members/unresolved-locations:
    get:
      tags: [Members]
      operationId: getUnresolvedLocations
      summary: List members without resolved coordinates
      description: |
        Returns all members where birth coordinates (lat/lng) are missing.
        No resolution is attempted; this is a pure read of the current DB state.
      responses:
        "200":
          description: List of unresolved members (possibly empty). Suggestions are always empty.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnresolvedLocationDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/members/resolve-locations:
    post:
      tags: [Members]
      operationId: resolveLocations
      summary: Attempt to auto-resolve missing birth coordinates
      description: |
        For each member without coordinates:
        - If birthCity + birthCountry yield an exact GeoNames match, coordinates are written to the DB (member removed from result).
        - If no exact match, the member is returned with up to 5 city suggestions from a prefix search.
        - If birthCity or birthCountry is absent, the member is returned with an empty suggestions list.
      responses:
        "200":
          description: Members that could not be auto-resolved, with any available city suggestions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnresolvedLocationDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/geocode/countries:
    get:
      tags: [Geocode]
      operationId: getCountries
      summary: Search countries by name prefix (case-insensitive)
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
          description: Name prefix to search for (minimum 1 character).
      responses:
        "200":
          description: List of matching countries (up to 20).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountrySuggestionDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/geocode/cities:
    get:
      tags: [Geocode]
      operationId: getCities
      summary: Search cities by ascii name prefix (case-insensitive), ordered by population
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
          description: ASCII name prefix to search for (minimum 2 characters).
        - in: query
          name: country
          required: false
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: Optional ISO 3166-1 alpha-2 country code to restrict results.
      responses:
        "200":
          description: List of matching cities (up to 8), ordered by population descending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CitySuggestionDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/relationships:
    get:
      tags: [Relationships]
      operationId: listRelationships
      summary: List all relationships
      responses:
        "200":
          description: List of relationships (possibly empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RelationshipDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Relationships]
      operationId: createRelationship
      summary: Create a relationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipRequestDto"
      responses:
        "201":
          description: Relationship created.
          headers:
            Location:
              description: URI of the created relationship.
              schema:
                type: string
                example: /api/relationships/1/2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/relationships/{firstMemberId}/{secondMemberId}:
    get:
      tags: [Relationships]
      operationId: getRelationshipByMemberPair
      summary: Get a relationship by member pair
      parameters:
        - $ref: "#/components/parameters/FirstMemberIdPath"
        - $ref: "#/components/parameters/SecondMemberIdPath"
      responses:
        "200":
          description: The relationship.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags: [Relationships]
      operationId: updateRelationshipByMemberPair
      summary: Update a relationship by member pair
      parameters:
        - $ref: "#/components/parameters/FirstMemberIdPath"
        - $ref: "#/components/parameters/SecondMemberIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipUpdateRequestDto"
      responses:
        "200":
          description: Updated relationship.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Relationships]
      operationId: deleteRelationshipByMemberPair
      summary: Delete a relationship by member pair
      parameters:
        - $ref: "#/components/parameters/FirstMemberIdPath"
        - $ref: "#/components/parameters/SecondMemberIdPath"
      responses:
        "204":
          description: Relationship deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/family-tree/{memberId}:
    get:
      tags: [FamilyTree]
      operationId: getFamilyTreeByHeadMemberId
      summary: Get family tree for a member (layout-aware)
      description: |
        Computes the family tree for the given memberId for the predecessors generations. The layout parameters influence
        subtreeLength computation.
      parameters:
        - $ref: "#/components/parameters/MemberIdPath"
        - in: query
          name: widthOfMemberNode
          required: true
          description: Width of a single member node (layout unit, e.g. px).
          schema:
            type: number
            format: float
            exclusiveMinimum: 0
            example: 160
        - in: query
          name: spaceBetweenMemberAndSpouse
          required: true
          description: Horizontal spacing between a member and spouse node (layout unit, e.g. px).
          schema:
            type: number
            format: float
            minimum: 0
            example: 24
        - in: query
          name: spaceBetweenChildren
          required: true
          description: Horizontal spacing between children (if they dont have spouses) (layout unit, e.g. px).
          schema:
            type: number
            format: float
            minimum: 0
            example: 32
        - in: query
          name: maxDepth
          required: false
          description: Maximum number of descendant generations to include. Omit or set to null for all generations.
          schema:
            type: integer
            format: int32
            minimum: 1
            nullable: true
      responses:
        "200":
          description: Family tree response containing the tree and referenced members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyTreeResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/family-tree-ancestor/{memberId}:
    get:
      tags: [FamilyTreeAncestor]
      operationId: getFamilyTreeAncestorByChildMemberId
      summary: Get ancestors family tree for a member (layout-aware)
      description: |
        Computes the family tree for the given memberId for the ancestors generations. The layout parameters 
        influence subtreeLength computation.
      parameters:
        - $ref: "#/components/parameters/MemberIdPath"
        - in: query
          name: widthOfMemberNode
          required: true
          description: Width of a single member node (layout unit, e.g. px).
          schema:
            type: number
            format: float
            exclusiveMinimum: 0
            example: 160
        - in: query
          name: spaceBetweenMemberNodes
          required: true
          description: Horizontal spacing between two member nodes (layout unit, e.g. px).
          schema:
            type: number
            format: float
            minimum: 0
            example: 24
        - in: query
          name: maxDepth
          required: false
          description: Maximum number of ancestor generations to include. Omit or set to null for all generations.
          schema:
            type: integer
            format: int32
            minimum: 1
            nullable: true
      responses:
        "200":
          description: Ancestor family tree response containing the tree and referenced members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyTreeAncestorResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtained from Keycloak. Pass it in the Authorization header:
          Authorization: Bearer <JWT>
        
        Obtain a token from the Keycloak token endpoint:
          POST http://localhost:8080/realms/family-tree/protocol/openid-connect/token

    keycloak:
      type: oauth2
      description: |
        OAuth2 Authorization Code flow — for use with Swagger UI in development only.
        Swagger UI will handle the redirect and attach the resulting JWT automatically.
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:8080/realms/family-tree/protocol/openid-connect/auth
          tokenUrl: http://localhost:8080/realms/family-tree/protocol/openid-connect/token
          scopes:
            openid: OpenID Connect scope

  parameters:
    MemberIdPath:
      name: memberId
      in: path
      required: true
      description: Member id.
      schema:
        type: integer
        format: int32
        minimum: 1

    FirstMemberIdPath:
      name: firstMemberId
      in: path
      required: true
      description: First member id.
      schema:
        type: integer
        format: int32
        minimum: 1

    SecondMemberIdPath:
      name: secondMemberId
      in: path
      required: true
      description: Second member id.
      schema:
        type: integer
        format: int32
        minimum: 1

  responses:
    BadRequest:
      description: Bad request (validation error or malformed input).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetailsDto"
          examples:
            validationError:
              summary: Validation failed
              value:
                type: https://example.com/problems/validation-error
                title: Validation failed
                status: 400
                detail: birthDate must be in format YYYY-MM-DD
                instance: /api/members
                errors:
                  - field: birthDate
                    message: must be a valid date

    Unauthorized:
      description: Missing or invalid Authorization header / expired JWT.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetailsDto"
          examples:
            unauthorized:
              summary: Unauthorized
              value:
                type: https://example.com/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: Authorization header is missing, malformed, or the JWT has expired.
                instance: /api/members

    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetailsDto"
          examples:
            notFound:
              summary: Member not found
              value:
                type: https://example.com/problems/not-found
                title: Not found
                status: 404
                detail: Member with id 123 was not found.
                instance: /api/members/123

    Conflict:
      description: Conflict (uniqueness/integrity constraint or incompatible state).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetailsDto"
          examples:
            conflict:
              summary: Conflict
              value:
                type: https://example.com/problems/conflict
                title: Conflict
                status: 409
                detail: A conflicting resource already exists or the operation is not allowed in the current state.
                instance: /api/members

    InternalServerError:
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetailsDto"
          examples:
            serverError:
              summary: Internal server error
              value:
                type: https://example.com/problems/internal-error
                title: Internal Server Error
                status: 500
                detail: Unexpected error occurred.
                instance: /api/members

  schemas:
    ProblemDetailsDto:
      type: object
      description: RFC 7807 compatible error format.
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type.
        title:
          type: string
          description: Short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence of the problem.
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence of the problem.
        errors:
          type: array
          description: Optional list of field-level validation errors.
          items:
            $ref: "#/components/schemas/FieldErrorDto"
      required:
        - title
        - status

    FieldErrorDto:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - field
        - message

    GenderDto:
      type: string
      enum: [M, F, D]

    RelationshipTypeDto:
      type: string
      enum: [parent, currentMarriedSpouse, currentSpouse, exSpouse]

    SpouseRelationshipTypeDto:
      type: string
      description: Relationship types relevant for spouse entries in the family tree.
      enum: [currentMarriedSpouse, currentSpouse, exSpouse]

    MemberPageDto:
      type: object
      description: Paginated list of members.
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/MemberDto"
        totalElements:
          type: integer
          format: int64
          description: Total number of elements matching the filter.
        totalPages:
          type: integer
          format: int32
          description: Total number of pages.
        page:
          type: integer
          format: int32
          description: Current zero-based page index.
        pageSize:
          type: integer
          format: int32
          description: Number of elements per page.
      required:
        - content
        - totalElements
        - totalPages
        - page
        - pageSize

    MemberDto:
      description: |
        Member representation returned by the API.
        Contains metadata and the externally stored image reference (if any).
      allOf:
        - $ref: "#/components/schemas/MemberIdDto"
        - $ref: "#/components/schemas/MemberMetadataDto"
        - type: object
          properties:
            imageFilePath:
              $ref: "#/components/schemas/ImageFilePath"

    MemberRequestDto:
      description: |
        Payload for creating or updating a single member.
        Sent as multipart/form-data with:
        - Flattened MemberMetadataDto fields (id excluded — IDs are auto-generated for single-member operations)
        - `imageFile` as an optional binary file upload.
      allOf:
        - $ref: "#/components/schemas/MemberMetadataDto"
        - type: object
          properties:
            imageFile:
              $ref: "#/components/schemas/ImageFile"

    MemberBulkRequestDto:
      description: |
        Payload for creating or updating a single member.
        Sent as multipart/form-data with:
        - Flattened MemberMetadataDto fields (id included for bulk upload)
      allOf:
        - $ref: "#/components/schemas/MemberIdDto"
        - $ref: "#/components/schemas/MemberMetadataDto"

    MemberIdDto:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int32
          minimum: 1
          description: Member's id.

    MemberMetadataDto:
      type: object
      description: |
        Core member metadata without any image content or image references.
        This object is transported as a JSON part inside multipart requests.
      required:
        - firstName
        - lastName
        - gender
        - birthDate
        - birthCity
        - birthCountry
      properties:
        firstName:
          type: string
          maxLength: 50
          description: Member's given name.
        lastName:
          type: string
          maxLength: 50
          description: Member's family name.
        initialLastName:
          type: string
          maxLength: 50
          description: Original family name at birth (if different).
        gender:
          $ref: "#/components/schemas/GenderDto"
        birthDate:
          type: string
          format: date
          description: Date of birth in ISO-8601 format (YYYY-MM-DD).
        deathDate:
          type: string
          format: date
          nullable: true
          description: Date of death, if applicable.
        birthCity:
          type: string
          maxLength: 50
          description: City of birth.
        birthCountry:
          type: string
          maxLength: 50
          description: Country of birth.
        email:
          type: string
          format: email
          maxLength: 50
          nullable: true
          description: Contact email address.
        telephone:
          type: string
          maxLength: 20
          nullable: true
          description: Contact telephone number.
        streetAndNumber:
          type: string
          maxLength: 100
          nullable: true
          description: Street name and house number.
        postcode:
          type: string
          maxLength: 10
          nullable: true
          description: Postal or ZIP code.
        city:
          type: string
          maxLength: 50
          nullable: true
          description: Current city of residence.
        occupation:
          type: string
          maxLength: 100
          nullable: true
          description: Last known occupation.
        notes:
          type: string
          maxLength: 500
          nullable: true
          description: Notes about the member.
        birthLat:
          type: number
          format: double
          nullable: true
          description: Latitude of the birth city, provided by the frontend from autocomplete selection.
        birthLng:
          type: number
          format: double
          nullable: true
          description: Longitude of the birth city, provided by the frontend from autocomplete selection.

    BulkUploadResultDto:
      type: object
      description: Result of a bulk member creation request.
      properties:
        created:
          type: array
          description: Members that were successfully validated and persisted.
          items:
            $ref: "#/components/schemas/MemberDto"
        failed:
          type: array
          description: Entries that could not be saved, with the validation errors that caused the failure.
          items:
            $ref: "#/components/schemas/BulkUploadFailureDto"
      required: [created, failed]

    BulkUploadFailureDto:
      type: object
      description: A single failed entry from a bulk upload request.
      properties:
        input:
          $ref: "#/components/schemas/MemberBulkRequestDto"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldErrorDto"
      required: [input, errors]

    UnresolvedLocationDto:
      type: object
      description: |
        A member whose birth coordinates could not be (or have not yet been) resolved,
        together with any GeoNames city candidates that may help an admin pick the right one.
      properties:
        member:
          $ref: "#/components/schemas/MemberDto"
        suggestions:
          type: array
          description: |
            Candidate cities from GeoNames. Populated by POST /resolve-locations when
            birthCity/birthCountry are present but no exact match was found.
            Empty on GET /unresolved-locations and when no city/country is stored.
          items:
            $ref: "#/components/schemas/CitySuggestionDto"
      required: [member, suggestions]

    CountrySuggestionDto:
      type: object
      description: A country suggestion returned by the geocode countries endpoint.
      properties:
        code:
          type: string
          description: ISO 3166-1 alpha-2 country code.
        name:
          type: string
          description: Human-readable country name.
      required: [code, name]

    CitySuggestionDto:
      type: object
      description: A city suggestion returned by the geocode cities endpoint.
      properties:
        name:
          type: string
          description: City display name.
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2 country code.
        countryName:
          type: string
          description: Human-readable country name.
        lat:
          type: number
          format: double
          description: Latitude.
        lng:
          type: number
          format: double
          description: Longitude.
      required: [name, countryCode, countryName, lat, lng]

    ImageFile:
      type: string
      format: binary
      nullable: true
      description: |
        Optional image file uploaded for the member.
        The backend stores the file externally and persists only the resulting reference.

    ImageFilePath:
      type: string
      nullable: true
      description: |
        Reference, path, or one-time URL pointing to the externally stored member image.
        Typically returned by GET operations.

    RelationshipDto:
      type: object
      properties:
        firstMemberId:
          type: integer
          format: int32
        secondMemberId:
          type: integer
          format: int32
        relationship:
          $ref: "#/components/schemas/RelationshipTypeDto"
      required:
        - firstMemberId
        - secondMemberId
        - relationship

    RelationshipRequestDto:
      $ref: "#/components/schemas/RelationshipDto"

    RelationshipUpdateRequestDto:
      type: object
      properties:
        relationship:
          $ref: "#/components/schemas/RelationshipTypeDto"
      required:
        - relationship

    FamilyUnitDto:
      type: object
      properties:
        spouseId:
          type: integer
          format: int32
        relationship:
          $ref: "#/components/schemas/SpouseRelationshipTypeDto"
        children:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/FamilyTreeOfMemberDto"
      required:
        - spouseId
        - relationship

    FamilyTreeOfMemberDto:
      type: object
      properties:
        memberId:
          type: integer
          format: int32
        subtreeLength:
          type: number
          format: float
        generation:
          type: number
          format: int32
          description: the generation (respective to the head member) of this member.
        family:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/FamilyUnitDto"
      required:
        - memberId
        - subtreeLength

    FamilyTreeResponseDto:
      type: object
      properties:
        headMemberId:
          type: integer
          format: int32
        numberTotal:
          type: integer
          format: int32
          description: Total number of members in tree.
        numberLiving:
          type: integer
          format: int32
          description: Total number of living members in tree.
        numberGenerations:
          type: integer
          format: in32
          description: Number of generations in tree.
        tree:
          $ref: "#/components/schemas/FamilyTreeOfMemberDto"
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberDto"
      required:
        - headMemberId
        - numberTotal
        - numberLiving
        - numberGenerations
        - tree
        - members

    FamilyTreeAncestorOfMemberDto:
      type: object
      properties:
        memberId:
          type: integer
          format: int32
        subtreeLength:
          type: number
          format: float
        generation:
          type: number
          format: int32
          description: the generation (respective to the child member) of this member.
        parents:
          $ref: "#/components/schemas/ParentsDto"
      required:
        - memberId
        - subtreeLength

    ParentsDto:
      type: object
      properties:
        parents:
          type: array
          minItems: 0
          maxItems: 2
          items:
            $ref: "#/components/schemas/FamilyTreeAncestorOfMemberDto"
        relationship:
          nullable: true
          $ref: "#/components/schemas/SpouseRelationshipTypeDto"

    FamilyTreeAncestorResponseDto:
      type: object
      properties:
        childMemberId:
          type: integer
          format: int32
        numberTotal:
          type: integer
          format: int32
          description: Total number of members in tree.
        numberLiving:
          type: integer
          format: int32
          description: Total number of living members in tree.
        numberGenerations:
          type: integer
          format: in32
          description: Number of generations in tree.
        tree:
          $ref: "#/components/schemas/FamilyTreeAncestorOfMemberDto"
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberDto"