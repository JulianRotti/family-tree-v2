quarkus:
  http:
    port: 8082
    limits:
      max-body-size: 10M
    cors:
      ~: true
      origins: ${CORS_ORIGINS:http://localhost:3000}
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Authorization,Content-Type,Accept
      exposed-headers: Location
      access-control-max-age: 24H
    access-log:
      enabled: true
      pattern: "%h %l %u %t \"%r\" %s %b %D ms"
  log:
    level: INFO
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    jdbc:
      url: ${DB_URL}
  hibernate-orm:
    multitenant: DISCRIMINATOR
  oidc:
    auth-server-url: ${OIDC_AUTH_SERVER_URL}
    client-id: ${OIDC_CLIENT_ID:family-tree-backend}
    application-type: service
    token:
      issuer: ${OIDC_TOKEN_ISSUER}

mp:
  openapi:
    scan:
      disable: true

minio:
  endpoint: ${MINIO_ENDPOINT}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:member-images}
