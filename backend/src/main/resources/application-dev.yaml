quarkus:
  http:
    port: 8082
    cors:
      ~: true
      origins: http://localhost:3000
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Authorization,Content-Type,Accept
      exposed-headers: Location
      access-control-max-age: 24H
    access-log:
      enexitabled: true
      pattern: "%h %l %u %t \"%r\" %s %b %D ms"  # IP, user, time, request, status, bytes, duration
  log:
    level: INFO
  datasource:
    username: dev_user
    password: dev_user
    jdbc:
      url: jdbc:mysql://localhost:3307/family_tree
  hibernate-orm:
    multitenant: DISCRIMINATOR
  swagger-ui:
    always-include: true
    oauth-client-id: family-tree-swagger
    oauth-use-pkce: true
    oauth-scopes: openid
  smallrye-openapi:
    auto-add-security: false
  oidc:
    auth-server-url: http://localhost:8080/realms/family-tree
    client-id: family-tree-backend
    application-type: service

mp:
  openapi:
    scan:
      disable: true

minio:
  endpoint: http://localhost:9000
  public-endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: member-images
